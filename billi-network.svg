<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 900 940"
  width="100%" height="100%"
  style="max-width:900px;display:block;margin:0 auto"
  preserveAspectRatio="xMidYMid meet">
<defs>
  <radialGradient id="bgGlow" cx="50%" cy="48%" r="52%">
    <stop offset="0%"  stop-color="#c87020" stop-opacity="0.10"/>
    <stop offset="60%" stop-color="#c87020" stop-opacity="0.03"/>
    <stop offset="100%" stop-color="#c87020" stop-opacity="0"/>
  </radialGradient>
  <filter id="gAmber"  x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gGreen"  x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7"  result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gPurple" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7"  result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gGold"   x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7"  result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gBlue"   x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7"  result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gRed"    x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7"  result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gCyan"   x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7"  result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    .nd1{animation:nd 4.4s ease-in-out infinite 0.00s;}
    .nd2{animation:nd 4.4s ease-in-out infinite 0.73s;}
    .nd3{animation:nd 4.4s ease-in-out infinite 1.47s;}
    .nd4{animation:nd 4.4s ease-in-out infinite 2.20s;}
    .nd5{animation:nd 4.4s ease-in-out infinite 2.93s;}
    .nd6{animation:nd 4.4s ease-in-out infinite 3.67s;}
    @keyframes nd{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .orbit{animation:orb 20s linear infinite;transform-origin:50% 50%;}
    @keyframes orb{to{transform:rotate(360deg)}}
    .pulse{animation:pulseR 3.2s ease-in-out infinite;}
    @keyframes pulseR{0%,100%{opacity:0.22}50%{opacity:0.06}}
    @keyframes billi-eye-ball{0%,13%{transform:scaleY(1);}16%,21%{transform:scaleY(0.05);}25%,47%{transform:scaleY(1);}51%,100%{transform:scaleY(0.05);}}
    @keyframes billi-eye-hi{0%,13%{opacity:1;}16%,21%{opacity:0;}25%,47%{opacity:1;}51%,100%{opacity:0;}}
    @keyframes billi-wink-bar{0%,13%{opacity:0;}16%,21%{opacity:1;}25%,47%{opacity:0;}51%,100%{opacity:1;}}
    .b-eye-ball{animation:billi-eye-ball 4.5s ease-in-out 1s infinite;transform-box:fill-box;transform-origin:center;}
    .b-eye-hi  {animation:billi-eye-hi   4.5s ease-in-out 1s infinite;}
    .b-wink-bar{animation:billi-wink-bar 4.5s ease-in-out 1s infinite;opacity:0;}
    .ib{fill-opacity:0.18;}
  </style>
</defs>

<!-- Warm radial wash -->
<circle cx="450" cy="450" r="440" fill="url(#bgGlow)"/>

<!--
  6 nodes at r=215, 60° apart, top=270°
  Node 1 top        (450,235)  — Bean Counter   green   #2ecc71
  Node 2 top-right  (636,342)  — Brand Guru     purple  #c77dff
  Node 3 bot-right  (636,558)  — Deal Maker     gold    #f4a100
  Node 4 bottom     (450,665)  — IT Guy         cyan    #00d4d4
  Node 5 bot-left   (264,558)  — Rule Book      sky     #38bdf8
  Node 6 top-left   (264,343)  — The Fixer      coral   #ff6b6b

  Lines (inner r=82 → outer r=178):
  ln1 (450,368)→(450,272)
  ln2 (521,409)→(604,361)
  ln3 (521,491)→(604,539)
  ln4 (450,532)→(450,628)
  ln5 (379,491)→(296,539)
  ln6 (379,409)→(296,361)

  Icon midpoints (r=130):
  ic1 (450,320)  ic2 (563,385)  ic3 (563,515)
  ic4 (450,580)  ic5 (337,515)  ic6 (337,385)
-->

<!-- ══ DASHED CONNECTOR LINES ══ -->
<line id="ln1" x1="450" y1="368" x2="450" y2="272" stroke="#2ecc71" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="6 7"/>
<line id="ln2" x1="521" y1="409" x2="604" y2="361" stroke="#c77dff" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="6 7"/>
<line id="ln3" x1="521" y1="491" x2="604" y2="539" stroke="#f4a100" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="6 7"/>
<line id="ln4" x1="450" y1="532" x2="450" y2="628" stroke="#00d4d4" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="6 7"/>
<line id="ln5" x1="379" y1="491" x2="296" y2="539" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="6 7"/>
<line id="ln6" x1="379" y1="409" x2="296" y2="361" stroke="#ff6b6b" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="6 7"/>

<!-- ══ TRAVELLING DOTS ══ -->
<circle r="4" fill="#2ecc71" filter="url(#gGreen)"><animateMotion dur="2.2s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear"><mpath href="#ln1"/></animateMotion></circle>
<circle r="4" fill="#c77dff" filter="url(#gPurple)"><animateMotion dur="2.7s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear"><mpath href="#ln2"/></animateMotion></circle>
<circle r="4" fill="#f4a100" filter="url(#gGold)"><animateMotion dur="1.9s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear"><mpath href="#ln3"/></animateMotion></circle>
<circle r="4" fill="#00d4d4" filter="url(#gCyan)"><animateMotion dur="2.3s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear"><mpath href="#ln4"/></animateMotion></circle>
<circle r="4" fill="#38bdf8" filter="url(#gBlue)"><animateMotion dur="2.5s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear"><mpath href="#ln5"/></animateMotion></circle>
<circle r="4" fill="#ff6b6b" filter="url(#gRed)"><animateMotion dur="2.9s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear"><mpath href="#ln6"/></animateMotion></circle>

